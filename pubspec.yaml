name: cocochat_app
description: A flutter project for CocoChat mobile clients on iOS and Android.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html

version: 0.1.0

environment:
  sdk: ">=2.17.0 <3.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter


  # for multi-language 
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  flutter_slidable: ^4.0.3
  sqflite: ^2.0.1
  simple_logger: ^1.9.0
  logging: ^1.1.1
  image: ^4.1.3
  uuid: ^4.5.1
  equatable: ^2.0.3
  convert: ^3.0.1
  intl: any
  json_annotation: ^4.4.0
  dio: ^5.3.3
  image_picker: ^1.0.4
  flutter_image_compress: ^2.0.4
  package_info_plus: ^9.0.0
  lpinyin: ^2.0.3
  saver_gallery: ^4.1.0
  connectivity_plus: ^7.0.0
  flutter_svg: ^2.2.3
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.1.11
  file_picker: ^11.0.2
  mime: ^2.0.0
  http_parser: ^4.0.0
  flutter_portal: ^1.0.0
  share_plus: ^12.0.1
  event_bus: ^2.0.0
  universal_html: ^2.0.8
  permission_handler: ^12.0.1
  path_provider: ^2.0.11
  flutter_pdfview: 1.4.4
  wechat_assets_picker: ^10.1.0
  wechat_camera_picker: ^4.2.2
  any_link_preview: ^3.0.0
  chewie: ^1.3.4
  video_player: ^2.4.8
  sqflite_common_ffi: ^2.1.1+1
  flutter_secure_storage: ^10.0.0
  app_links: ^7.0.0
  qr_flutter: ^4.0.0
  mobile_scanner: ^7.1.4
  shared_preferences: ^2.1.1
  record: ^6.2.0
  audio_session: ^0.2.2
  audioplayers: ^6.5.1
  device_info_plus: ^12.3.0
  android_id: ^0.5.0
  file_saver: ^0.2.14
  photo_view: ^0.15.0
  video_thumbnail: ^0.5.3
  web_socket_channel: ^3.0.3
  flutter_emoji: ^2.5.1

  path: any
  http: any
  scrollable_positioned_list: any
dependency_overrides:

hooks:
  user_defines:
    sqlite3:
      source: system

dev_dependencies:
  flutter_test:
    sdk: flutter

  json_serializable: ^6.1.4
  build_runner: ^2.1.7

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0


  # To Generate app icons for iOS and Android
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/cocochat_icon.jpg"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  generate: true

  assets:
    - assets/init_db.sql
    - assets/org_db.sql
    # - assets/custom_configs.yaml

    # images
    - assets/images/chats.png
    - assets/images/default_avatar.png
    - assets/images/cocochat_icon.jpg
    - assets/images/cocochat_icon.png

    - assets/font/icon/
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # assets/font/Inter/static/Inter-Light.ttf
  fonts:
    - family: Inter
      fonts:
        - asset: assets/font/Inter/static/Inter-Thin.ttf
          weight: 100
        - asset: assets/font/Inter/static/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/font/Inter/static/Inter-Light.ttf
          weight: 300
        - asset: assets/font/Inter/static/Inter-Regular.ttf
          weight: 400
        - asset: assets/font/Inter/static/Inter-Medium.ttf
          weight: 500
        - asset: assets/font/Inter/static/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/font/Inter/static/Inter-Bold.ttf
          weight: 700
        - asset: assets/font/Inter/static/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/font/Inter/static/Inter-Black.ttf
          weight: 900

    - family: AppIcons
      fonts:
        - asset: assets/font/icon/AppIcons.ttf


  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
